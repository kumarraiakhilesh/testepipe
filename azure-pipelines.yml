trigger: none

pool:
  name: adresh

variables:
  serviceConnection: 'akhilesh27may'

stages:

# ---------------------------
# 1. FORMAT
# ---------------------------
- stage: FMT
  displayName: "Terraform Format Check"
  jobs:
  - job: fmt
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - script: |
        terraform fmt -recursive
      displayName: "Auto Fix Terraform Format"

    - script: |
        terraform fmt -check -recursive
      displayName: "Verify Terraform Format"

# ---------------------------
# 2. VALIDATE
# ---------------------------
- stage: VALIDATE
  dependsOn: FMT
  jobs:
  - job: validate
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: 'c1apgenikatestlele'
        backendAzureRmStorageAccountName: 'capstora2'
        backendAzureRmContainerName: 'pipetest27'
        backendAzureRmKey: 'capstora.tfstate'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'

# ---------------------------
# 3. SECURITY
# ---------------------------
- stage: SECURITY
  dependsOn: VALIDATE
  jobs:
  - job: security
    steps:
    - powershell: |
        choco install tfsec -y
        tfsec .
      displayName: "Run tfsec scan"

# ---------------------------
# 4. PLAN
# ---------------------------
- stage: PLAN
  dependsOn: SECURITY
  jobs:
  - job: plan
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: 'c1apgenikatestlele'
        backendAzureRmStorageAccountName: 'capstora2'
        backendAzureRmContainerName: 'pipetest27'
        backendAzureRmKey: 'capstora.tfstate'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: $(serviceConnection)

# ---------------------------
# 5. APPLY
# ---------------------------
- stage: APPLY
  dependsOn: PLAN
  condition: succeeded()
  jobs:
  - job: apply
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: 'c1apgenikatestlele'
        backendAzureRmStorageAccountName: 'capstora2'
        backendAzureRmContainerName: 'pipetest27'
        backendAzureRmKey: 'capstora.tfstate'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: $(serviceConnection)
        args: '-auto-approve'